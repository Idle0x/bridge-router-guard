[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "scripts"

remappings = [
  "forge-std/=lib/forge-std/src/",
  "drosera-contracts/=lib/drosera-contracts/src/"
]

# ─── FIX: Stack-too-deep resolution ──────────────────────────────────────────
# viaIR enables the intermediate representation compiler pipeline, which
# automatically spills variables to memory when the 16-slot stack limit is hit.
# Required for complex test bases with large parameter lists.
optimizer = true
optimizer_runs = 200
via_ir = true

[fuzz]
runs = 256

[invariant]
runs = 256
